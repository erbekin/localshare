<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Record List</title>
        <style>
            body {
                font-family: system-ui, sans-serif;
                margin: 2rem;
            }
            .record {
                border: 1px solid #ccc;
                padding: 1rem;
                margin-bottom: 1rem;
                border-radius: 6px;
            }
            .error {
                color: red;
                font-weight: bold;
            }
            .meta {
                color: #555;
                font-size: 0.9em;
                margin-bottom: 0.5rem;
            }
            /* New style for the download button */
            .download-btn {
                display: inline-block;
                background-color: #007bff;
                color: white;
                text-decoration: none;
                padding: 0.5rem 1rem;
                border-radius: 4px;
                font-size: 0.9em;
                margin-top: 0.5rem;
            }
            .download-btn:hover {
                background-color: #0056b3;
            }
            .nav-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 2rem;
                border-bottom: 1px solid #eee;
                padding-bottom: 1rem;
            }
            .btn-primary {
                background-color: #28a745; /* Green */
                color: white;
                padding: 0.6rem 1.2rem;
                text-decoration: none;
                border-radius: 4px;
                font-weight: bold;
            }
            .btn-primary:hover {
                background-color: #218838;
            }
            .delete-btn {
                display: inline-block;
                background-color: #dc3545;
                color: white;
                border: none;
                padding: 0.5rem 1rem;
                border-radius: 4px;
                font-size: 0.9em;
                margin-top: 0.5rem;
                margin-left: 0.4rem;
                cursor: pointer;
            }
            .delete-btn:hover { background-color: #b02a37; }

            #admin-btn {
                background-color: #6c757d;
                color: white;
                padding: 0.6rem 1.2rem;
                text-decoration: none;
                border-radius: 4px;
                font-weight: bold;
                border: none;
                cursor: pointer;
                font-size: 1rem;
            }
            #admin-btn:hover { background-color: #5a6268; }
            #admin-btn.is-admin {
                background-color: #28a745;
                cursor: default;
            }
            .qr-section {
                text-align: center;
                margin-bottom: 2rem;
            }
            .qr-section img {
                width: 180px;
                height: 180px;
                border: 1px solid #ccc;
                border-radius: 6px;
            }
            .qr-section p {
                color: #555;
                font-size: 0.85em;
                margin-top: 0.5rem;
            }
        </style>
    </head>
    <body>
        <div class="nav-header">
            <h1>Uploaded Records</h1>
            <div style="display:flex; gap:0.6rem; align-items:center;">
                <button id="admin-btn" onclick="handleAdminClick()">Login as Admin</button>
                <a href="/upload" class="btn-primary">+ Upload New File</a>
            </div>
        </div>
        <div class="qr-section" id="qr-section">
            <img id="qr-img" src="/qr" alt="QR Code" onerror="handleQrError()" />
            <p>Scan to open on your phone</p>
        </div>
        <div id="qr-error" style="display:none; color:#888; font-size:0.85em; margin-bottom:1rem;">
            QR code not available
        </div>
        <div id="output">Loading…</div>

        <script>
            let isAdmin = false;

            async function checkSession() {
                try {
                    const res = await fetch("/api/session");
                    return res.ok;
                } catch (_) {
                    return false;
                }
            }

            function handleAdminClick() {
                if (isAdmin) return; // already admin, button is decorative
                window.location.href = "/api/login?return_url=/";
            }

            function setAdminUI(admin) {
                isAdmin = admin;
                const btn = document.getElementById("admin-btn");
                if (admin) {
                    btn.textContent = "Admin \u2713";
                    btn.classList.add("is-admin");
                } else {
                    btn.textContent = "Login as Admin";
                    btn.classList.remove("is-admin");
                }
            }

            async function deleteRecord(uuid) {
                if (!confirm("Permanently delete this file?")) return;
                const res = await fetch(`/api/delete/${uuid}`, { method: "DELETE" });
                if (res.ok) {
                    await loadRecords();
                } else {
                    const text = await res.text();
                    alert("Delete failed: " + (text || res.status));
                }
            }

            async function loadRecords() {
                const output = document.getElementById("output");

                try {
                    const res = await fetch("/api/list");

                    if (!res.ok) {
                        const text = await res.text();
                        throw new Error(text || `HTTP ${res.status}`);
                    }

                    const records = await res.json();

                    if (!Array.isArray(records)) {
                        throw new Error("Invalid response format");
                    }

                    output.innerHTML = "";

                    for (const r of records) {
                        const div = document.createElement("div");
                        div.className = "record";

                        div.innerHTML = `
                            <strong>${r.name}</strong>
                            <div class="meta">
                                UUID: ${r.uuid}<br>
                                Uploaded: ${new Date(r.uploaded_at).toLocaleString()}<br>
                                Author: ${r.author}
                            </div>
                            <p>${r.description ?? "No description"}</p>
                            <a href="/api/download/${r.uuid}" class="download-btn">Download</a>
                            ${isAdmin ? `<button class="delete-btn" onclick="deleteRecord('${r.uuid}')">Delete</button>` : ""}
                        `;

                        output.appendChild(div);
                    }

                    if (records.length === 0) {
                        output.textContent = "No records found.";
                    }
                } catch (err) {
                    output.innerHTML = `<div class="error">Error: ${err.message}</div>`;
                }
            }

            function handleQrError() {
                document.getElementById("qr-section").style.display = "none";
                document.getElementById("qr-error").style.display = "block";
            }

            // Startup
            (async () => {
                const admin = await checkSession();
                setAdminUI(admin);
                await loadRecords();
            })();
        </script>
    </body>
</html>
