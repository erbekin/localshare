<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Upload File</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 500px;
            margin: 2rem auto;
            padding: 0 1rem;
            color: #333;
        }

        /* Header & Navigation */
        header {
            margin-bottom: 2rem;
            border-bottom: 1px solid #eee;
            padding-bottom: 1rem;
        }
        .back-link {
            text-decoration: none;
            color: #666;
            font-size: 0.9rem;
        }
        .back-link:hover { color: #000; text-decoration: underline; }

        /* Form Styling */
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
        }
        input[type="text"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 0.6rem;
            box-sizing: border-box; /* Keeps padding inside width */
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
        }
        input:focus, textarea:focus {
            border-color: #007bff;
            outline: none;
        }

        /* Button Styling */
        #upload-btn {
            width: 100%;
            padding: 0.8rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        #upload-btn:hover { background-color: #0056b3; }
        #upload-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Progress Bar */
        #progress-container {
            display: none;
            margin-top: 1.2rem;
        }
        #progress-track {
            width: 100%;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            height: 10px;
        }
        #progress-fill {
            height: 100%;
            width: 0%;
            background: #007bff;
            border-radius: 4px;
            transition: width 0.1s ease, background 0.3s ease;
        }
        #progress-fill.success { background: #28a745; }
        #progress-fill.error   { background: #dc3545; }
        #progress-label {
            text-align: center;
            font-size: 0.82rem;
            color: #555;
            margin-top: 0.4rem;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" class="back-link">← Back to Homepage</a>
        <h1>Upload New Record</h1>
    </header>

    <div class="form-container">
        <div class="form-group">
            <label for="author">Author Name</label>
            <input id="author" name="author" type="text" placeholder="e.g. Alice" required minlength="1">
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4" placeholder="Enter file details..."></textarea>
        </div>

        <div class="form-group">
            <label for="file">Select File</label>
            <input id="file" name="file" type="file" required>
        </div>

        <button id="upload-btn">Upload File</button>

        <div id="progress-container">
            <div id="progress-track">
                <div id="progress-fill"></div>
            </div>
            <div id="progress-label">0%</div>
        </div>
    </div>

    <script>
        const btn          = document.getElementById("upload-btn");
        const progressBox  = document.getElementById("progress-container");
        const progressFill = document.getElementById("progress-fill");
        const progressLbl  = document.getElementById("progress-label");

        function setProgress(pct, state) {
            progressFill.style.width = pct + "%";
            progressLbl.textContent  = pct + "%";
            progressFill.className   = state ?? "";
        }

        function resetUI() {
            btn.disabled  = false;
            btn.innerText = "Upload File";
        }

        btn.onclick = () => {
            const fileInput   = document.getElementById("file");
            const authorInput = document.getElementById("author");
            const descInput   = document.getElementById("description");

            const file        = fileInput.files[0];
            const author      = authorInput.value.trim();
            const description = descInput.value.trim();

            if (!file)   return alert("Please select a file.");
            if (!author) return alert("Please enter an author name.");

            // Prepare UI
            btn.disabled              = true;
            btn.innerText             = "Uploading\u2026";
            progressBox.style.display = "block";
            progressFill.className    = "";
            setProgress(0);

            const params = new URLSearchParams({ author, description, filename: file.name });

            const xhr = new XMLHttpRequest();
            xhr.open("POST", `/api/upload?${params}`);
            xhr.setRequestHeader("Content-Type", "application/octet-stream");

            // --- Progress tracking ---
            xhr.upload.addEventListener("progress", (e) => {
                if (e.lengthComputable) {
                    setProgress(Math.round((e.loaded / e.total) * 100));
                }
            });

            // --- Success / failure ---
            xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                    setProgress(100, "success");
                    progressLbl.textContent = "Done!";
                    const { id } = JSON.parse(xhr.responseText);
                    alert(`Success! File uploaded with ID: ${id}`);
                    fileInput.value = "";
                    descInput.value = "";
                } else {
                    setProgress(100, "error");
                    progressLbl.textContent = "Upload failed";
                    alert("Error: " + (xhr.responseText || "Upload failed"));
                }
                resetUI();
            };

            xhr.onerror = () => {
                setProgress(100, "error");
                progressLbl.textContent = "Network error";
                alert("A network error occurred. Check your connection and try again.");
                resetUI();
            };

            xhr.send(file);
        };
    </script>
</body>
</html>
