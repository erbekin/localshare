<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login – LocalShare</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 400px;
            margin: 5rem auto;
            padding: 0 1rem;
            color: #333;
        }
        h1 { margin-bottom: 0.25rem; }
        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
        }
        input[type="password"] {
            width: 100%;
            padding: 0.6rem;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
        }
        input[type="password"]:focus {
            border-color: #007bff;
            outline: none;
        }
        #login-btn {
            width: 100%;
            padding: 0.8rem;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
        #login-btn:hover { background-color: #0056b3; }
        #login-btn:disabled { background-color: #ccc; cursor: not-allowed; }

        #error-msg {
            display: none;
            color: #842029;
            background: #f8d7da;
            border: 1px solid #f5c2c7;
            border-radius: 4px;
            padding: 0.6rem 0.8rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        .back-link {
            display: block;
            margin-top: 1.2rem;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .back-link:hover { color: #000; text-decoration: underline; }
    </style>
</head>
<body>
    <h1>Admin Login</h1>
    <p class="subtitle">Enter the admin password to manage files.</p>

    <div id="error-msg"></div>

    <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Admin password" autofocus />
    </div>

    <button id="login-btn">Login</button>
    <a href="/" class="back-link">← Back to Homepage</a>

    <script>
        const params     = new URLSearchParams(window.location.search);
        const returnUrl  = params.get("return_url") || "/";

        const btn        = document.getElementById("login-btn");
        const errorMsg   = document.getElementById("error-msg");
        const pwdInput   = document.getElementById("password");

        function showError(text) {
            errorMsg.textContent = text;
            errorMsg.style.display = "block";
        }

        async function doLogin() {
            const password = pwdInput.value;
            if (!password) return;

            btn.disabled    = true;
            btn.textContent = "Logging in\u2026";
            errorMsg.style.display = "none";

            try {
                const body = new URLSearchParams({ password, from: returnUrl });
                const res  = await fetch("/api/auth", {
                    method:  "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body:    body.toString(),
                });

                if (res.ok) {
                    window.location.href = returnUrl;
                } else {
                    const text = await res.text();
                    showError(text || "Login failed. Check your password.");
                    pwdInput.select();
                }
            } catch (_) {
                showError("Network error. Please try again.");
            } finally {
                btn.disabled    = false;
                btn.textContent = "Login";
            }
        }

        btn.addEventListener("click", doLogin);
        pwdInput.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
    </script>
</body>
</html>
